name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: peerbox

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - run: |
          cargo llvm-cov --workspace --all-features \
            --lcov --output-path lcov.info \
            --fail-under-lines 80
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build-linux-amd64:
    name: Build (x86_64-unknown-linux-gnu)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu
      - run: cargo build --release --target x86_64-unknown-linux-gnu
      - run: |
          tar -czf ${{ env.BINARY_NAME }}-x86_64-unknown-linux-gnu.tar.gz \
            -C target/x86_64-unknown-linux-gnu/release \
            ${{ env.BINARY_NAME }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-x86_64-unknown-linux-gnu
          path: ${{ env.BINARY_NAME }}-x86_64-unknown-linux-gnu.tar.gz

  build-linux-arm64:
    name: Build (aarch64-unknown-linux-gnu)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-unknown-linux-gnu
      - name: Install cross
        run: cargo install cross --locked
      - run: cross build --release --target aarch64-unknown-linux-gnu
      - run: |
          tar -czf ${{ env.BINARY_NAME }}-aarch64-unknown-linux-gnu.tar.gz \
            -C target/aarch64-unknown-linux-gnu/release \
            ${{ env.BINARY_NAME }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-aarch64-unknown-linux-gnu
          path: ${{ env.BINARY_NAME }}-aarch64-unknown-linux-gnu.tar.gz

  build-macos-intel:
    name: Build (x86_64-apple-darwin)
    needs: test
    runs-on: macos-13
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-apple-darwin
      - run: cargo build --release --target x86_64-apple-darwin
      - run: |
          tar -czf ${{ env.BINARY_NAME }}-x86_64-apple-darwin.tar.gz \
            -C target/x86_64-apple-darwin/release \
            ${{ env.BINARY_NAME }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-x86_64-apple-darwin
          path: ${{ env.BINARY_NAME }}-x86_64-apple-darwin.tar.gz

  build-macos-arm:
    name: Build (aarch64-apple-darwin)
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-apple-darwin
      - run: cargo build --release --target aarch64-apple-darwin
      - run: |
          tar -czf ${{ env.BINARY_NAME }}-aarch64-apple-darwin.tar.gz \
            -C target/aarch64-apple-darwin/release \
            ${{ env.BINARY_NAME }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-aarch64-apple-darwin
          path: ${{ env.BINARY_NAME }}-aarch64-apple-darwin.tar.gz

  build-windows:
    name: Build (x86_64-pc-windows-msvc)
    needs: test
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc
      - run: cargo build --release --target x86_64-pc-windows-msvc
      - shell: bash
        run: |
          7z a ${{ env.BINARY_NAME }}-x86_64-pc-windows-msvc.zip \
            target/x86_64-pc-windows-msvc/release/${{ env.BINARY_NAME }}.exe
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-x86_64-pc-windows-msvc
          path: ${{ env.BINARY_NAME }}-x86_64-pc-windows-msvc.zip

  build-android:
    name: Build Android APK (aarch64)
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev libsqlite3-dev pkg-config \
            llvm clang libclang-dev \
            libxcursor-dev libx11-dev libasound2-dev \
            libpulse-dev libwayland-dev libxkbcommon-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-makepad
        run: cargo install --force --git https://github.com/makepad/makepad --branch dev cargo-makepad

      - name: Install Android toolchain
        run: cargo makepad android install-toolchain --full-ndk

      - name: Build Android APK
        run: |
          cargo makepad android build -p peerbox-desktop --release

      - name: Find and copy APK
        run: |
          APK=$(find target -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" "${{ env.BINARY_NAME }}-desktop-android-aarch64.apk"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-android-apk
          path: ${{ env.BINARY_NAME }}-desktop-android-aarch64.apk

  docker:
    name: Docker
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    name: Helm Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Package chart
        run: |
          helm package charts/peerbox --destination .deploy

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Push chart to GHCR
        run: |
          helm push .deploy/*.tgz oci://ghcr.io/${{ github.repository }}/charts

  github-release:
    name: Create GitHub Release
    needs:
      - test
      - coverage
      - build-linux-amd64
      - build-linux-arm64
      - build-macos-intel
      - build-macos-arm
      - build-windows
      - build-android
      - docker
      - helm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog
        run: git-cliff --latest --strip header > CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
